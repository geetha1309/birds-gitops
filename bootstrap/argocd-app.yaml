apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: birds-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/geetha1309/birds-gitops.git
    targetRevision: main
    path: apps/birds/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: birds
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true